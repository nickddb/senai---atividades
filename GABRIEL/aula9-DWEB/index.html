<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="index.css" rel="stylesheet">
</head>
<body>
    <main class="mainContainer">
        <aside class="image">
            
        </aside>
        <section class="inputContainer">
            <h2>Autumn Archive</h2>
            <div>
                <h1>Welcome back!</h1>
                <p>Step back into the vault of timeless knowledge</p>
            </div>
            <form id="loginForm" class="loginForm">
                <label>Email</label>
                <input id="email" type="email" placeholder="email@autumnarc.com">
                <label>Senha</label>
                <input id="senha" type="password" placeholder="********">
                <span class="esqueciSenha">
                    <div class="esqueciSenhaCheckbox">
                        <input type="checkbox">
                        <label>Remember me</label>
                    </div>
                    <a href="/recovery.html">Forgot your password?</a>
                    
                </span>
                <input id="entrar" type="submit" value="Entrar"> 
            </form>
            <div class="google">
                <h2>Or continue with</h2>
                <input type="button" value="Sign Up With Google">
                <p>Don't have an account? <a href="/register">Register Here</a></p>
            </div>
            <footer>
                <p>Privacy Policy</p>
                <p>Service Terms</p>
                <p>Help</p>
            </footer>
        </section>
    </main>
    <script src="index.js"></script>

</body>
</html>
